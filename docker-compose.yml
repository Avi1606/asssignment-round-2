version: '3.8'

services:
  # Leave Management System Application
  leave-management-app:
    build: .
    container_name: lms-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "com.lms.service=leave-management-system"
      - "com.lms.version=1.0.0"
    networks:
      - lms-network

  # Optional PostgreSQL Database (for production)
  postgres-db:
    image: postgres:15-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lmsdb
      POSTGRES_USER: lmsuser
      POSTGRES_PASSWORD: lmspass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmsuser -d lmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lms-network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lms.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    restart: unless-stopped
    networks:
      - lms-network
    profiles:
      - admin

volumes:
  postgres_data:
    driver: local

networks:
  lms-network:
    driver: bridge
    labels:
      - "com.lms.network=main"