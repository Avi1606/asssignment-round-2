spring:
  application:
    name: leave-management-system
  
  profiles:
    active: dev
    
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:lmsdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console
      
  # SQL Initialization
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      defer-datasource-initialization: true
      
# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api/v1
    
# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    
# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      
# Logging Configuration
logging:
  level:
    com.lms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    
---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  h2:
    console:
      enabled: false
      
logging:
  level:
    com.lms: INFO
    root: WARN